<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{font-family:'Inter',system-ui,sans-serif;box-sizing:border-box;}
    body{margin:0;background:#f8fafc;}
    .hs::-webkit-scrollbar{display:none;}
    .hs{-ms-overflow-style:none;scrollbar-width:none;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#6366f1!important;background:#fff!important;box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
    button:active{opacity:0.82;}
    @media(min-width:768px){
      .mob{display:none!important;}
      .dsk{display:flex!important;}
      .dsk-bl{display:block!important;}
      .mc{margin-left:220px!important;}
      .bnav{display:none!important;}
    }
    @media(max-width:767px){
      .desk{display:none!important;}
      .dsk{display:none!important;}
      .dsk-bl{display:none!important;}
      .mc{margin-left:0!important;}
      .bnav{display:flex!important;}
    }
    @media(min-width:640px){.sg2{grid-template-columns:1fr 1fr!important;}.srd{border-radius:16px!important;}}
    .tab-btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all 0.15s;}
    .tab-btn.active{background:#6366f1;color:#fff;}
    .tab-btn:not(.active){background:#f1f5f9;color:#64748b;}
    .card{background:#fff;border-radius:14px;border:1px solid #e8edf2;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback} = React;

// ── Icons ──
const Ic = ({d,size=16,sw=2,col,style:s={}})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={col||"currentColor"}
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
    style={{display:"inline-block",verticalAlign:"middle",flexShrink:0,...s}}>
    {Array.isArray(d)?d.map((p,i)=><path key={i} d={p}/>):<path d={d}/>}
  </svg>
);
const IC={
  Plus:"M12 5v14M5 12h14",
  Search:"M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z",
  X:"M18 6L6 18M6 6l12 12",
  Edit:["M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7","M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"],
  Trash:["M3 6h18","M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6","M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"],
  Kanban:["M3 3h7v7H3z","M14 3h7v7h-7z","M3 14h7v7H3z","M14 14h7v7h-7z"],
  List:["M8 6h13","M8 12h13","M8 18h13","M3 6h.01","M3 12h.01","M3 18h.01"],
  Chart:["M18 20V10","M12 20V4","M6 20v-6"],
  Timeline:["M12 8v4l3 3","M3.05 11a9 9 0 1 0 .5-3"],
  Compare:["M9 3H5a2 2 0 0 0-2 2v4","M9 3h10a2 2 0 0 1 2 2v4","M9 3v18","M3 9h18","M3 15h18","M9 21H5a2 2 0 0 1-2-2v-4","M9 21h10a2 2 0 0 0 2-2v-4"],
  ChevR:"M9 18l6-6-6-6",
  ChevD:"M6 9l6 6 6-6",
  ChevU:"M18 15l-6-6-6 6",
  Brief:["M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z","M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"],
  Mail:["M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z","M22 6l-10 7L2 6"],
  Phone:"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.13 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16l.92.92z",
  Dollar:["M12 1v22","M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"],
  Bell:["M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9","M13.73 21a2 2 0 0 1-3.46 0"],
  Tag:"M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z M7 7h.01",
  Link:["M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71","M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"],
  Journal:["M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z","M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"],
  Prep:["M9 11l3 3L22 4","M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"],
  Share:["M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8","M16 6l-4-4-4 4","M12 2v13"],
  User:"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
  Sort:["M8 6l4-4 4 4","M16 18l-4 4-4-4","M12 2v20"],
  Alert:"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01",
  Copy:["M20 9H11a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2z","M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"],
  Check:"M20 6L9 17l-5-5",
};
const I=({n,size=16,sw=2,col,style:s={}})=><Ic d={IC[n]} size={size} sw={sw} col={col} style={s}/>;

// ── Constants ──
const PROFILES=[
  {id:"nicolas", name:"Nicolas", avatar:"N", color:"#6366f1", bg:"#eef2ff"},
  {id:"anjana",  name:"Anjana",  avatar:"A", color:"#ec4899", bg:"#fdf2f8"},
];
const STATUSES=[
  {id:"todo",      label:"À postuler",        dot:"#94a3b8",badgeBg:"#f1f5f9",badgeText:"#475569",badgeBorder:"#cbd5e1",bar:"#94a3b8"},
  {id:"applied",   label:"Postulé",            dot:"#3b82f6",badgeBg:"#eff6ff",badgeText:"#1d4ed8",badgeBorder:"#bfdbfe",bar:"#3b82f6"},
  {id:"interview", label:"Entretien planifié", dot:"#6366f1",badgeBg:"#eef2ff",badgeText:"#4338ca",badgeBorder:"#c7d2fe",bar:"#6366f1"},
  {id:"offer",     label:"Offre reçue",        dot:"#10b981",badgeBg:"#ecfdf5",badgeText:"#065f46",badgeBorder:"#a7f3d0",bar:"#10b981"},
  {id:"rejected",  label:"Refusé / Archivé",   dot:"#f43f5e",badgeBg:"#fff1f2",badgeText:"#be123c",badgeBorder:"#fecdd3",bar:"#f43f5e"},
];
const si=id=>STATUSES.find(s=>s.id===id)||STATUSES[0];
const uid=()=>Math.random().toString(36).slice(2,10);
const lsKey=(pid,k)=>`jt_${pid}_${k}`;
const loadLS=(pid,k)=>{try{return JSON.parse(localStorage.getItem(lsKey(pid,k)))||null;}catch{return null;}};
const saveLS=(pid,k,v)=>localStorage.setItem(lsKey(pid,k),JSON.stringify(v));
const fmtDate=d=>d?new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}):"—";
const daysDiff=d=>{if(!d)return null;const diff=Math.floor((new Date(d)-new Date())/86400000);return diff;};

const EMPTY_JOB={
  company:"",position:"",contact:"",email:"",phone:"",salary:"",
  status:"todo",notes:"",tags:[],links:[],
  followUpDate:"",journal:[],prep:{questions:"",research:"",toAsk:""},
};

// ── Shared UI ──
const INP={width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #e2e8f0",background:"#f8fafc",color:"#0f172a",fontSize:13,fontFamily:"inherit",transition:"all 0.15s"};
const FL=({label,children})=>(
  <div style={{display:"flex",flexDirection:"column",gap:5}}>
    <label style={{fontSize:11,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</label>
    {children}
  </div>
);

function StatusBadge({id}){
  const s=si(id);
  return <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:999,fontSize:11,fontWeight:500,background:s.badgeBg,color:s.badgeText,border:`1px solid ${s.badgeBorder}`,whiteSpace:"nowrap"}}>
    <span style={{width:6,height:6,borderRadius:999,background:s.dot,display:"inline-block"}}/>
    {s.label}
  </span>;
}

function TagPill({label,color="indigo",onRemove}){
  const C={indigo:{bg:"#eef2ff",text:"#4338ca",border:"#c7d2fe"},rose:{bg:"#fff1f2",text:"#be123c",border:"#fecdd3"},slate:{bg:"#f1f5f9",text:"#475569",border:"#cbd5e1"}};
  const c=C[color]||C.slate;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 8px 3px 10px",borderRadius:999,fontSize:11,fontWeight:500,background:c.bg,color:c.text,border:`1px solid ${c.border}`,whiteSpace:"nowrap"}}>
    {label}
    {onRemove&&<button onClick={onRemove} style={{display:"flex",background:"none",border:"none",cursor:"pointer",color:c.text,padding:0,opacity:.7}}><I n="X" size={10}/></button>}
  </span>;
}

function FollowUpBadge({date}){
  if(!date)return null;
  const d=daysDiff(date);
  if(d>3)return null;
  const overdue=d<0;
  const today=d===0;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:600,background:overdue?"#fff1f2":today?"#fffbeb":"#eff6ff",color:overdue?"#be123c":today?"#92400e":"#1d4ed8",border:`1px solid ${overdue?"#fecdd3":today?"#fde68a":"#bfdbfe"}`}}>
    <I n="Bell" size={11}/>
    {overdue?`Relance en retard de ${Math.abs(d)}j`:today?"Relance aujourd'hui":`Relance dans ${d}j`}
  </span>;
}

// ── Multi-select tags ──
function MultiSelect({value=[],onChange,allTags=[],onNewTag,placeholder="Ajouter un tag…"}){
  const [inp,setInp]=useState("");
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const filtered=allTags.filter(t=>!value.includes(t)&&t.toLowerCase().includes(inp.toLowerCase()));
  const canCreate=inp.trim()&&!allTags.map(t=>t.toLowerCase()).includes(inp.trim().toLowerCase())&&!value.map(t=>t.toLowerCase()).includes(inp.trim().toLowerCase());
  const add=tag=>{if(!value.includes(tag))onChange([...value,tag]);if(!allTags.includes(tag))onNewTag(tag);setInp("");setOpen(false);};
  const remove=tag=>onChange(value.filter(t=>t!==tag));
  return(
    <div ref={ref}>
      {value.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>{value.map(t=><TagPill key={t} label={t} color="slate" onRemove={()=>remove(t)}/>)}</div>}
      <div style={{position:"relative"}}>
        <input value={inp} onChange={e=>{setInp(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}
          onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();if(canCreate)add(inp.trim());else if(filtered[0])add(filtered[0]);}if(e.key==="Escape")setOpen(false);}}
          placeholder={placeholder} style={INP}/>
        {open&&(filtered.length>0||canCreate)&&(
          <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:300,background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",boxShadow:"0 8px 24px rgba(0,0,0,0.12)",overflow:"hidden"}}>
            {filtered.map(t=><div key={t} onClick={()=>add(t)} style={{padding:"9px 12px",fontSize:13,color:"#334155",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}><I n="Tag" size={12} style={{marginRight:6,color:"#94a3b8"}}/>{t}</div>)}
            {canCreate&&<div onClick={()=>add(inp.trim())} style={{padding:"9px 12px",fontSize:13,color:"#6366f1",cursor:"pointer",fontWeight:500,borderTop:filtered.length?"1px solid #f1f5f9":"none"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}><I n="Plus" size={13} style={{marginRight:6}}/> Créer « {inp.trim()} »</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Modal ──
function Modal({title,onClose,children,wide=false}){
  useEffect(()=>{
    const h=e=>e.key==="Escape"&&onClose();
    window.addEventListener("keydown",h);document.body.style.overflow="hidden";
    return()=>{window.removeEventListener("keydown",h);document.body.style.overflow="";};
  },[]);
  return(
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)"}}/>
      <div style={{position:"relative",background:"#fff",width:"100%",maxWidth:wide?720:520,maxHeight:"94vh",overflowY:"auto",borderRadius:"20px 20px 0 0",boxShadow:"0 -4px 40px rgba(0,0,0,0.2)"}} className="srd">
        <div style={{position:"sticky",top:0,background:"#fff",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"15px 20px",zIndex:1}}>
          <span style={{fontWeight:700,color:"#0f172a",fontSize:16}}>{title}</span>
          <button onClick={onClose} style={{padding:8,borderRadius:999,border:"none",background:"#f1f5f9",color:"#64748b",cursor:"pointer",display:"flex"}}><I n="X" size={16}/></button>
        </div>
        <div style={{padding:20}}>{children}</div>
      </div>
    </div>
  );
}

// ── Job Form (tabs inside) ──
function JobForm({initial=EMPTY_JOB,onSave,onCancel,globalTags,onNewTag}){
  const [f,setF]=useState({...EMPTY_JOB,...initial,journal:initial.journal||[],prep:initial.prep||{questions:"",research:"",toAsk:""},tags:initial.tags||[],links:initial.links||[]});
  const [tab,setTab]=useState("info");
  const [newLink,setNewLink]=useState({label:"",url:""});
  const [journalEntry,setJEntry]=useState("");
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const setNested=(k,sub)=>e=>setF(p=>({...p,[k]:{...p[k],[sub]:e.target.value}}));

  const addLink=()=>{if(newLink.url){setF(p=>({...p,links:[...p.links,{...newLink,id:uid()}]}));setNewLink({label:"",url:""});}};
  const removeLink=id=>setF(p=>({...p,links:p.links.filter(l=>l.id!==id)}));
  const addJEntry=()=>{if(journalEntry.trim()){setF(p=>({...p,journal:[{id:uid(),date:new Date().toISOString(),text:journalEntry},...(p.journal||[])]}));setJEntry("");}};

  const TABS=[{id:"info",label:"Infos"},{id:"prep",label:"Préparation"},{id:"journal",label:"Journal"},{id:"links",label:"Liens & Tags"}];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      {/* Tab bar */}
      <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap"}}>
        {TABS.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>

      {/* INFO */}
      {tab==="info"&&(
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr",gap:11}} className="sg2">
            <FL label="Entreprise"><input style={INP} placeholder="Nom de l'entreprise" value={f.company} onChange={set("company")}/></FL>
            <FL label="Poste"><input style={INP} placeholder="Intitulé du poste" value={f.position} onChange={set("position")}/></FL>
            <FL label="Contact"><input style={INP} placeholder="Prénom Nom" value={f.contact} onChange={set("contact")}/></FL>
            <FL label="E-mail"><input style={INP} type="email" placeholder="contact@entreprise.fr" value={f.email} onChange={set("email")}/></FL>
            <FL label="Téléphone"><input style={INP} placeholder="+33 6 …" value={f.phone} onChange={set("phone")}/></FL>
            <FL label="Salaire"><input style={INP} placeholder="45k€ brut / an" value={f.salary} onChange={set("salary")}/></FL>
          </div>
          <FL label="Statut">
            <select style={INP} value={f.status} onChange={set("status")}>
              {STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </FL>
          <FL label="🔔 Date de relance">
            <input style={INP} type="date" value={f.followUpDate} onChange={set("followUpDate")}/>
          </FL>
          <FL label="Notes libres">
            <textarea style={{...INP,resize:"none",minHeight:80}} rows={3} placeholder="Informations complémentaires…" value={f.notes} onChange={set("notes")}/>
          </FL>
        </div>
      )}

      {/* PREP */}
      {tab==="prep"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{padding:12,background:"#eef2ff",borderRadius:10,fontSize:12,color:"#4338ca",display:"flex",gap:8,alignItems:"flex-start"}}>
            <I n="Prep" size={14} style={{marginTop:1,flexShrink:0}}/>
            <span>Prépare ton entretien ici : questions possibles, recherches sur l'entreprise, ce que tu veux demander.</span>
          </div>
          <FL label="❓ Questions probables & mes réponses">
            <textarea style={{...INP,resize:"none",minHeight:110}} rows={5} placeholder={"Ex :\n- Parlez-moi de vous → ...\n- Pourquoi ce poste → ..."} value={f.prep.questions} onChange={setNested("prep","questions")}/>
          </FL>
          <FL label="🔍 Recherches sur l'entreprise">
            <textarea style={{...INP,resize:"none",minHeight:90}} rows={4} placeholder="Chiffres clés, actualités, culture d'entreprise, concurrents…" value={f.prep.research} onChange={setNested("prep","research")}/>
          </FL>
          <FL label="💬 Ce que je veux demander">
            <textarea style={{...INP,resize:"none",minHeight:80}} rows={3} placeholder={"Ex :\n- Comment se passe l'onboarding ?\n- Quelle est la culture d'équipe ?"} value={f.prep.toAsk} onChange={setNested("prep","toAsk")}/>
          </FL>
        </div>
      )}

      {/* JOURNAL */}
      {tab==="journal"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <FL label="Nouvelle entrée">
            <textarea style={{...INP,resize:"none",minHeight:80}} rows={3} placeholder="Note un événement, ressenti, échange téléphonique…" value={journalEntry} onChange={e=>setJEntry(e.target.value)}/>
          </FL>
          <button onClick={addJEntry} disabled={!journalEntry.trim()} style={{padding:"9px 16px",borderRadius:10,border:"none",background:journalEntry.trim()?"#6366f1":"#e2e8f0",color:journalEntry.trim()?"#fff":"#94a3b8",fontSize:13,fontWeight:600,cursor:journalEntry.trim()?"pointer":"default",fontFamily:"inherit",alignSelf:"flex-start"}}>
            Ajouter au journal
          </button>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {(f.journal||[]).length===0&&<p style={{color:"#94a3b8",fontSize:13,textAlign:"center",padding:"20px 0"}}>Aucune entrée pour l'instant</p>}
            {(f.journal||[]).map(e=>(
              <div key={e.id} style={{padding:"10px 14px",background:"#f8fafc",borderRadius:10,border:"1px solid #f1f5f9"}}>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>{fmtDate(e.date)}</div>
                <div style={{fontSize:13,color:"#334155",whiteSpace:"pre-wrap"}}>{e.text}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* LINKS & TAGS */}
      {tab==="links"&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <FL label="🏷️ Tags libres">
            <MultiSelect value={f.tags} onChange={v=>setF(p=>({...p,tags:v}))} allTags={globalTags} onNewTag={onNewTag} placeholder="Ex: Remote, Start-up, Via LinkedIn…"/>
          </FL>
          <FL label="🔗 Liens (offre, CV envoyé, profil LinkedIn…)">
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>
              {(f.links||[]).map(l=>(
                <div key={l.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0"}}>
                  <I n="Link" size={13} style={{color:"#94a3b8",flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#334155",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.label||l.url}</div>

// ── Timeline View ──
function TimelineView({jobs}){
  const events=useMemo(()=>{
    const evts=[];
    jobs.forEach(j=>{
      evts.push({date:j.createdAt||Date.now(),type:"created",job:j});
      (j.journal||[]).forEach(e=>evts.push({date:new Date(e.date).getTime(),type:"journal",job:j,text:e.text}));
      if(j.followUpDate)evts.push({date:new Date(j.followUpDate).getTime(),type:"followup",job:j,future:new Date(j.followUpDate)>new Date()});
    });
    return evts.sort((a,b)=>b.date-a.date);
  },[jobs]);
  const colors={created:"#6366f1",journal:"#3b82f6",followup:"#f59e0b"};
  const labels={created:"Candidature créée",journal:"Note journal",followup:"Relance prévue"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:0,position:"relative",paddingLeft:28}}>
      <div style={{position:"absolute",left:9,top:0,bottom:0,width:2,background:"#e2e8f0",borderRadius:1}}/>
      {events.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8",fontSize:13}}>Aucun événement à afficher</div>}
      {events.map((ev,i)=>(
        <div key={i} style={{position:"relative",marginBottom:14}}>
          <div style={{position:"absolute",left:-24,top:4,width:10,height:10,borderRadius:999,background:colors[ev.type],border:"2px solid #fff",boxShadow:"0 0 0 2px "+colors[ev.type]}}/>
          <div className="card" style={{padding:"10px 14px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:600,color:colors[ev.type],textTransform:"uppercase",letterSpacing:"0.05em"}}>{labels[ev.type]}</span>
              <span style={{fontSize:11,color:"#94a3b8"}}>{fmtDate(ev.date)}</span>
            </div>
            <div style={{fontSize:13,fontWeight:600,color:"#0f172a"}}>{ev.job.company||"—"} · {ev.job.position||"—"}</div>
            {ev.text&&<div style={{fontSize:12,color:"#64748b",marginTop:4,whiteSpace:"pre-wrap"}}>{ev.text}</div>}
            {ev.type==="followup"&&ev.future&&<div style={{marginTop:4}}><FollowUpBadge date={ev.job.followUpDate}/></div>}
          </div>
        </div>
      ))}
    </div>
  );
}

        {STATUSES.map(s=>{const c=by[s.id]||0;const p=total?Math.round(c/total*100):0;return(
          <div key={s.id} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:999,background:s.dot,display:"inline-block"}}/><span style={{fontSize:12,fontWeight:500,color:"#334155"}}>{s.label}</span></div>
              <span style={{fontSize:11,fontWeight:700,padding:"1px 7px",borderRadius:999,background:s.badgeBg,color:s.badgeText}}>{c}</span>
            </div>
            <div style={{height:6,background:"#f1f5f9",borderRadius:999,overflow:"hidden"}}><div style={{height:"100%",width:`${p}%`,background:s.dot,borderRadius:999,transition:"width 0.6s"}}/></div>
          </div>
        );})}
      </div>
      {alerts.length>0&&(
        <div className="card" style={{padding:16}}>
          <div style={{fontWeight:600,color:"#0f172a",fontSize:13,marginBottom:10,display:"flex",alignItems:"center",gap:6}}><I n="Bell" size={14} col="#f59e0b"/> Relances à faire</div>
          {alerts.map(j=>(
            <div key={j.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f8fafc"}}>
              <div><div style={{fontSize:13,fontWeight:600,color:"#0f172a"}}>{j.company}</div><div style={{fontSize:11,color:"#64748b"}}>{j.position}</div></div>
              <FollowUpBadge date={j.followUpDate}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Share Modal ──
function ShareModal({profileName,onClose}){
  const url=window.location.href;
  const [copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{padding:14,background:"#f0fdf4",borderRadius:10,border:"1px solid #bbf7d0",fontSize:13,color:"#166534"}}>
        ⚠️ Cette app utilise le LocalStorage : chaque appareil/navigateur a ses propres données. Le lien donne accès à la même URL mais pas aux mêmes données.
      </div>
      <FL label="Lien de l'application">
        <div style={{display:"flex",gap:8}}>
          <input style={{...INP,flex:1}} value={url} readOnly/>
          <button onClick={copy} style={{padding:"9px 14px",borderRadius:10,border:"none",background:copied?"#10b981":"#6366f1",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
            <I n={copied?"Check":"Copy"} size={13}/>{copied?"Copié !":"Copier"}
          </button>
        </div>
      </FL>
      <p style={{fontSize:12,color:"#64748b",margin:0}}>Partage ce lien à {profileName} ou à un proche pour qu'ils accèdent à l'application.</p>
    </div>
  );
}

// ── Profile Screen ──
function ProfileScreen({onSelect}){
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#eef2ff 0%,#f8fafc 50%,#fdf2f8 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{textAlign:"center",marginBottom:40}}>
        <div style={{width:56,height:56,borderRadius:16,background:"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 4px 20px rgba(99,102,241,0.4)"}}>
          <I n="Brief" size={26} col="#fff"/>
        </div>
        <h1 style={{margin:0,fontSize:26,fontWeight:800,color:"#0f172a"}}>JobTracker</h1>
        <p style={{margin:"8px 0 0",color:"#64748b",fontSize:14}}>Qui postule aujourd'hui ?</p>
      </div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
        {PROFILES.map(p=>(
          <button key={p.id} onClick={()=>onSelect(p)} style={{
            display:"flex",flexDirection:"column",alignItems:"center",gap:12,
            padding:"28px 36px",borderRadius:20,border:`2px solid ${p.color}20`,
            background:"#fff",cursor:"pointer",fontFamily:"inherit",
            boxShadow:"0 4px 20px rgba(0,0,0,0.08)",transition:"all 0.2s",
            minWidth:140
          }}
          onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)";e.currentTarget.style.boxShadow=`0 8px 30px ${p.color}30`;}}
          onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 4px 20px rgba(0,0,0,0.08)";}}>
            <div style={{width:60,height:60,borderRadius:999,background:p.bg,border:`3px solid ${p.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:800,color:p.color}}>
              {p.avatar}
            </div>
            <span style={{fontSize:16,fontWeight:700,color:"#0f172a"}}>{p.name}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Main App ──
const NAV=[
  {id:"kanban",  label:"Kanban",   icon:"Kanban"},
  {id:"list",    label:"Tableau",  icon:"List"},
  {id:"timeline",label:"Timeline", icon:"Timeline"},
  {id:"compare", label:"Comparer", icon:"Compare"},
  {id:"stats",   label:"Stats",    icon:"Chart"},
];

function MainApp({profile,onLogout}){
  const pid=profile.id;
  const [jobs,setJobs]=useState(()=>loadLS(pid,"jobs")||[]);
  const [tags,setTags]=useState(()=>loadLS(pid,"tags")||[]);
  const [view,setView]=useState("kanban");
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null); // null | "add" | "edit" | "view" | "share"
  const [activeJob,setActiveJob]=useState(null);

  useEffect(()=>saveLS(pid,"jobs",jobs),[jobs,pid]);
  useEffect(()=>saveLS(pid,"tags",tags),[tags,pid]);

  const addTag=t=>{if(!tags.includes(t))setTags(p=>[...p,t]);};
  const filtered=useMemo(()=>{
    if(!search.trim())return jobs;
    const q=search.toLowerCase();
    return jobs.filter(j=>j.company.toLowerCase().includes(q)||j.position.toLowerCase().includes(q));
  },[jobs,search]);

  const alertCount=jobs.filter(j=>j.followUpDate&&daysDiff(j.followUpDate)<=0).length;

  const openView=j=>{setActiveJob(j);setModal("view");};
  const openEdit=j=>{setActiveJob(j);setModal("edit");};
  const saveJob=f=>{
    if(modal==="add")setJobs(p=>[{...f,id:uid(),createdAt:Date.now()},...p]);
    else setJobs(p=>p.map(x=>x.id===activeJob.id?{...x,...f}:x));
    setModal(null);setActiveJob(null);
  };
  const delJob=id=>{if(window.confirm("Supprimer ?"))setJobs(p=>p.filter(x=>x.id!==id));};
  const chgSt=(id,status)=>setJobs(p=>p.map(x=>x.id===id?{...x,status}:x));

  return(
    <div style={{minHeight:"100vh",background:"#f8fafc"}}>
      {/* Sidebar */}
      <div className="dsk" style={{flexDirection:"column",position:"fixed",left:0,top:0,bottom:0,width:220,background:"#0f172a",zIndex:40}}>
        <div style={{padding:"18px 16px",borderBottom:"1px solid #1e293b"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:30,height:30,borderRadius:9,background:"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}><I n="Brief" size={14}/></div>
            <div><div style={{fontWeight:700,fontSize:13,color:"#fff"}}>JobTracker</div><div style={{fontSize:10,color:"#64748b"}}>Mes candidatures</div></div>
          </div>
        </div>
        {/* Profile chip */}
        <div style={{padding:"12px 16px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:999,background:profile.bg,border:`2px solid ${profile.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:profile.color,flexShrink:0}}>{profile.avatar}</div>
          <span style={{fontSize:13,fontWeight:600,color:"#e2e8f0",flex:1}}>{profile.name}</span>
          <button onClick={onLogout} title="Changer de profil" style={{padding:4,background:"none",border:"none",cursor:"pointer",color:"#64748b",display:"flex"}}><I n="User" size={14}/></button>
        </div>
        <nav style={{flex:1,padding:8,overflowY:"auto"}}>
          {NAV.map(({id,label,icon})=>(
            <button key={id} onClick={()=>setView(id)} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"9px 11px",borderRadius:9,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:500,marginBottom:2,textAlign:"left",background:view===id?"#6366f1":"transparent",color:view===id?"#fff":"#64748b",transition:"all 0.15s"}}>
              <I n={icon} size={15}/>{label}
            </button>
          ))}
        </nav>
        <div style={{padding:12,borderTop:"1px solid #1e293b",display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={()=>{setActiveJob(null);setModal("share");}} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px",borderRadius:9,border:"1px solid #1e293b",background:"transparent",color:"#64748b",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>
            <I n="Share" size={13}/> Partager
          </button>
          <button onClick={()=>{setActiveJob(null);setModal("add");}} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px",borderRadius:9,border:"none",background:"#6366f1",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 2px 8px rgba(99,102,241,0.4)"}}>
            <I n="Plus" size={13}/> Nouvelle candidature
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="mc" style={{minHeight:"100vh"}}>
        {/* Header */}
        <div style={{position:"sticky",top:0,zIndex:30,background:"rgba(255,255,255,0.93)",backdropFilter:"blur(12px)",borderBottom:"1px solid #f1f5f9",padding:"9px 16px",display:"flex",alignItems:"center",gap:10}}>
          <div className="mob" style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div style={{width:26,height:26,borderRadius:8,background:"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}><I n="Brief" size={12}/></div>
            <div style={{width:24,height:24,borderRadius:999,background:profile.bg,border:`2px solid ${profile.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:profile.color}}>{profile.avatar}</div>
          </div>
          <div style={{flex:1,position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94a3b8",display:"flex",pointerEvents:"none"}}><I n="Search" size={13}/></span>
            <input style={{...INP,paddingLeft:30,paddingRight:search?28:12,border:"1px solid transparent",background:"#f1f5f9",borderRadius:10}} placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}/>
            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#94a3b8",display:"flex"}}><I n="X" size={12}/></button>}
          </div>
          {alertCount>0&&<div style={{position:"relative",flexShrink:0}}><I n="Bell" size={18} col="#f59e0b"/><span style={{position:"absolute",top:-4,right:-4,width:14,height:14,borderRadius:999,background:"#ef4444",color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{alertCount}</span></div>}
          <span className="dsk-bl" style={{fontSize:11,color:"#94a3b8",fontWeight:500,whiteSpace:"nowrap"}}>{filtered.length} candidature{filtered.length!==1?"s":""}</span>
          <button onClick={()=>{setActiveJob(null);setModal("add");}} className="mob" style={{width:34,height:34,borderRadius:9,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><I n="Plus" size={15}/></button>
        </div>

        {/* Content */}
        <div style={{padding:"16px 16px 100px"}}>
          <div style={{fontWeight:700,color:"#0f172a",fontSize:16,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            {NAV.find(n=>n.id===view)?.label}
            {search&&<span style={{fontSize:12,fontWeight:400,color:"#94a3b8"}}>· "{search}"</span>}
          </div>
          {view==="kanban"   &&<KanbanView   jobs={filtered} onView={openView} onStatusChange={chgSt}/>}
          {view==="list"     &&<ListView     jobs={filtered} onView={openView} onStatusChange={chgSt}/>}
          {view==="timeline" &&<TimelineView jobs={jobs}/>}
          {view==="compare"  &&<CompareView  jobs={jobs}/>}
          {view==="stats"    &&<StatsView    jobs={jobs}/>}
        </div>
      </div>

      {/* Bottom nav */}
      <div className="bnav" style={{position:"fixed",bottom:0,left:0,right:0,zIndex:40,background:"#fff",borderTop:"1px solid #f1f5f9",display:"none"}}>
        {NAV.map(({id,label,icon})=>(
          <button key={id} onClick={()=>setView(id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 0 10px",border:"none",background:"transparent",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:500,color:view===id?"#6366f1":"#94a3b8"}}>
            <I n={icon} size={18} sw={view===id?2.5:1.8}/>{label}
          </button>
        ))}
      </div>

      {/* Modals */}
      {(modal==="add"||modal==="edit")&&(
        <Modal title={modal==="add"?"Nouvelle candidature":"Modifier"} onClose={()=>{setModal(null);setActiveJob(null);}}>
          <JobForm initial={modal==="edit"?activeJob:EMPTY_JOB} onSave={saveJob} onCancel={()=>{setModal(null);setActiveJob(null);}} globalTags={tags} onNewTag={addTag}/>
        </Modal>
      )}
      {modal==="view"&&activeJob&&(
        <Modal title={activeJob.company||"Candidature"} onClose={()=>{setModal(null);setActiveJob(null);}}>
          <JobDetail job={activeJob} onEdit={()=>openEdit(activeJob)} onClose={()=>{setModal(null);setActiveJob(null);}}/>
        </Modal>
      )}
      {modal==="share"&&(
        <Modal title="Partager l'application" onClose={()=>setModal(null)}>
          <ShareModal profileName={profile.name} onClose={()=>setModal(null)}/>
        </Modal>
      )}
    </div>
  );
}

// ── Root ──
function Root(){
  const [profile,setProfile]=useState(null);
  if(!profile)return<ProfileScreen onSelect={setProfile}/>;
  return<MainApp profile={profile} onLogout={()=>setProfile(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
